<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cairn — Remember what matters</title>
<meta name="description" content="A local-first tool for preserving family stories, personal history, and cultural knowledge.">
<meta name="theme-color" content="#6b4c3b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cairn">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; frame-src 'none'; object-src 'none'">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg">
<link rel="apple-touch-icon" href="/icons/icon-512.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="grain-overlay"></div>

  <header>
    <div class="header-inner">
      <div class="header-brand">
        <svg class="cairn-logo" viewBox="0 0 80 80" width="44" height="44" aria-label="Cairn">
          <ellipse cx="40" cy="60" rx="26" ry="12" fill="var(--primary)" opacity="0.6"/>
          <ellipse cx="40" cy="46" rx="22" ry="10" fill="var(--primary)" opacity="0.75"/>
          <circle cx="40" cy="30" r="16" fill="var(--primary)" opacity="0.9"/>
        </svg>
        <div>
          <h1>Cairn</h1>
          <p class="tagline">Remember what matters.</p>
        </div>
      </div>
      <div class="header-controls">
        <button id="dark-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle dark mode">
          <span class="icon-sun">&#9788;</span>
          <span class="icon-moon">&#9790;</span>
        </button>
      </div>
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab active" role="tab" data-view="people" aria-selected="true">People</button>
      <button class="tab" role="tab" data-view="stories" aria-selected="false">Stories</button>
      <button class="tab" role="tab" data-view="timeline" aria-selected="false">Timeline</button>
      <button class="tab" role="tab" data-view="tree" aria-selected="false">Tree</button>
      <button class="tab" role="tab" data-view="stats" aria-selected="false">Stats</button>
    </nav>
  </header>

  <main id="app" role="main">
    <div class="loading-state">
      <div class="loading-stones">
        <span></span><span></span><span></span>
      </div>
      <p>Gathering memories...</p>
    </div>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(() => {
          // Service worker registered
        }).catch(() => {
          // Silent fail — no big deal
        });
      });
    }
  </script>
  <script type="module" src="/app.js"></script>
</body>
</html>
