<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cairn</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="header-top">
      <div>
        <h1>Cairn</h1>
        <p class="tagline">Remember what matters.</p>
      </div>
      <button id="dark-toggle" class="icon-btn" title="Toggle dark mode">&#9790;</button>
    </div>
    <nav class="tabs">
      <button class="tab active" data-view="people">People</button>
      <button class="tab" data-view="stories">Stories</button>
      <button class="tab" data-view="timeline">Timeline</button>
      <button class="tab" data-view="tree">Tree</button>
      <button class="tab" data-view="stats">Stats</button>
    </nav>
  </header>

  <main id="app"></main>

  <div id="modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
